<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Mugsmith | India's First Story-Driven Mug Brand</title>
    <meta name="title" content="Mugsmith | India's First Story-Driven Mug Brand" />
    <meta name="description" content="Discover mugs crafted around your workspace identity. Take our 60-second quiz to find the perfect mug that turns your morning ritual into something meaningful." />
    <meta name="author" content="Mugsmith" />
    <meta name="keywords" content="mugs, coffee mugs, ceramic mugs, workspace mugs, personality mugs, India mugs, gift mugs, premium mugs, designer mugs, Mugsmith" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mugsmith.in/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mugsmith.in/" />
    <meta property="og:title" content="Mugsmith | India's First Story-Driven Mug Brand" />
    <meta property="og:description" content="Discover mugs crafted around your workspace identity. Take our 60-second quiz to find the perfect mug that turns your morning ritual into something meaningful." />
    <meta property="og:image" content="https://mugsmith.in/og-image.jpg" />
    <meta property="og:site_name" content="Mugsmith" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mugsmith.in/" />
    <meta name="twitter:title" content="Mugsmith | India's First Story-Driven Mug Brand" />
    <meta name="twitter:description" content="Discover mugs crafted around your workspace identity. Take our 60-second quiz to find the perfect mug that turns your morning ritual into something meaningful." />
    <meta name="twitter:image" content="https://mugsmith.in/og-image.jpg" />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Mugsmith",
        "url": "https://mugsmith.in",
        "logo": "https://mugsmith.in/logo.png",
        "description": "India's first story-driven mug brand. We craft pieces that turn ordinary moments into quiet rituals.",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "",
          "contactType": "customer service",
          "email": "hello@mugsmith.in"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Mugsmith",
        "url": "https://mugsmith.in",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://mugsmith.in/collection?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
